<!DOCTYPE html>

<html lang="en">
<head>

        <title> Lev's Video CLICK PLAY </title>

        <style>

                header{
                background-color:#111;   /* header background */
                color:white;             /* text color */
                padding:20px;            /* space inside */
                text-align:center;       /* center text */
                }

        </style>

</head>

<body>

        <header>
        
                <h1>Disappearing video after you watch</h1>

        </header>

        <video id = "levVideo" width="320" height="240" controls>

                <source src = "videoplayback.mp4" type = "video/mp4">
        
        </video>

        <script>

                let video = document.getElementById("levVideo")

                if (document.cookie.includes("watched=true")){
                        video.remove();
                        alert("You've watched");

                }

                document.getElementById("levVideo").addEventListener("ended",function (){

                        document.cookie = "watched=true; path=/; max-age =" + (60 * 60 * 24);
                        video.remove();
                        alert("video watched! cookie set")

                });

        </script>

</body>

</html>
