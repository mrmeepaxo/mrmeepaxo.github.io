<header>
    <h1>Disappearing video after you watch</h1>
</header>

<div class="main-content">
    <div class="video-container" id="videoWrapper">
        <div id="player"></div>
    </div>

    <div id="message"></div>
</div>

<script>
    let player;
    let playCount = 0;

    const wrapper = document.getElementById("videoWrapper");
    const messageDiv = document.getElementById("message");

    function showMessage(text) {
        messageDiv.textContent = text;
        messageDiv.classList.add("message");
    }

    // Cookie check
    if (document.cookie.includes("watched=true")) {
        wrapper.remove();
        showMessage("You already watched the video!");
    } else {

        // Load YouTube API
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player('player', {
                videoId: '7EkpC1RTnyY',
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerStateChange(event) {
            // 0 = ended
            if (event.data === 0) {
                playCount++;

                if (playCount < 2) {
                    player.seekTo(0);
                    player.playVideo();
                } else {
                    document.cookie = "watched=true; path=/; max-age=" + (60 * 60 * 24);
                    wrapper.remove();
                    showMessage("You already watched the video!");
                }
            }
        }
    }
</script>
