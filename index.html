<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lev's Video</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        .video-container {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        video {
            width: 800px;
            max-width: 90vw;
            border-radius: 8px;
        }

        .message {
            margin-top: 30px;
            font-size: 1.5rem;
            color: #ff6b6b;
        }
    </style>
</head>

<body>

    <header>
        <h1>🎬 Watch Carefully… You Only Get Two Plays</h1>
    </header>

    <div class="video-container" id="videoWrapper">
        <video id="levVideo" controls>
            <source src="videoplayback.mp4" type="video/mp4">
        </video>
    </div>

    <div id="message"></div>

    <script>
        const video = document.getElementById("levVideo");
        const wrapper = document.getElementById("videoWrapper");
        const messageDiv = document.getElementById("message");

        // Check cookie
        if (document.cookie.includes("watched=true")) {
            wrapper.remove();
            showMessage("🚫 You've already watched the video twice!");
        }

        let playCount = 0;

        video.addEventListener("ended", function () {
            playCount++;

            if (playCount < 2) {
                // Replay automatically
                video.currentTime = 0;
                video.play();
            } else {
                // Block after second play
                document.cookie = "watched=true; path=/; max-age=" + (60 * 60 * 24);

                wrapper.remove();
                showMessage("✅ You've finished both views. No more replays!");
            }
        });

        function showMessage(text) {
            messageDiv.textContent = text;
            messageDiv.classList.add("message");
        }
    </script>

</body>
</html>
