<header>
    <h1>Disappearing video after you watch</h1>
</header>

<div class="main-content">
    <div class="video-container" id="videoWrapper">
        <div id="player"></div>
    </div>

    <div id="message"></div>

    <div class="second-part" id="secondPart">
        <h2>You already watched the video</h2>
        <p>This is your second part.</p>
    </div>
</div>

<script>
    let player;
    let endCount = 0;
    let hasStarted = false;

    const wrapper = document.getElementById("videoWrapper");
    const messageDiv = document.getElementById("message");
    const secondPart = document.getElementById("secondPart");

    function showMessage(text) {
        messageDiv.textContent = text;
        messageDiv.classList.add("message");
    }

    function finishVideoFlow() {
        document.cookie = "watched=true; path=/; max-age=" + (60 * 60 * 24);
        wrapper.style.display = "none";
        showMessage("You already watched video.");
        secondPart.style.display = "block";
    }

    if (document.cookie.includes("watched=true")) {
        wrapper.style.display = "none";
        showMessage("You already watched video.");
        secondPart.style.display = "block";
    } else {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player("player", {
                videoId: "7EkpC1RTnyY",
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 1,
                    rel: 0,
                    playsinline: 1
                },
                events: {
                    onReady: function (event) {
                        event.target.playVideo();
                    },
                    onStateChange: function (event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            hasStarted = true;
                        }

                        if (event.data === YT.PlayerState.ENDED && hasStarted) {
                            endCount++;

                            if (endCount === 1) {
                                player.seekTo(0);
                                player.playVideo();
                            } else if (endCount >= 2) {
                                finishVideoFlow();
                            }
                        }
                    }
                }
            });
        };
    }
</script>
