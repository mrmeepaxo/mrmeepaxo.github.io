```
<header>
    <h1>Disappearing video after you watch</h1>
</header>

<div class="main-content">
    <div class="video-container" id="videoWrapper">

        <iframe
            id="levVideo"
            src="https://www.youtube.com/embed/7EkpC1RTnyY"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>

    </div>

    <div id="message"></div>
</div>

<script>
    const wrapper = document.getElementById("videoWrapper");
    const messageDiv = document.getElementById("message");

    function showMessage(text) {
        messageDiv.textContent = text;
        messageDiv.classList.add("message");
    }

    // If already watched
    if (document.cookie.includes("watched=true")) {
        wrapper.remove();
        showMessage("You've already watched the video!");
    } else {
        // When user clicks video → mark as watched
        const iframe = document.getElementById("levVideo");

        iframe.addEventListener("click", function () {
            document.cookie = "watched=true; path=/; max-age=" + (60 * 60 * 24);
        });
    }
</script>
